version: '3.8'

services:
  ml-service:
    build: ./ml-service
    container_name: farm-twin-ml
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: farm-twin-backend
    ports:
      - "8080:8080"
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: farm-twin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
