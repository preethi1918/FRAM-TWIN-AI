server:
  port: 8080

spring:
  application:
    name: farm-twin-backend
  datasource:
    url: jdbc:h2:mem:farmtwin
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

ml:
  service:
    base-url: ${ML_SERVICE_URL:http://localhost:8000}

logging:
  level:
    com.farmtwin: INFO
